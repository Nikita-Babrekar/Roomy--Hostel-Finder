<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | UniStay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .recovery-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 450px; text-align: center; }
        .icon-box { background: #e0e7ff; color: #6366f1; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin: 0 auto 20px; font-size: 30px; }
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #f1f5f9; margin-bottom: 20px; }
        .btn-reset { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); border: none; color: white; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; }
    </style>
</head>
<body>

<div class="recovery-card">
    <div class="icon-box"><i class="fas fa-key"></i></div>
    <h3 class="fw-bold">Forgot Password?</h3>
    <p class="text-muted small mb-4">No worries! Enter your email and we'll send you reset instructions.</p>
    
    <form>
        <div class="text-start">
            <label class="small fw-bold mb-2">Email Address</label>
            <input type="email" class="form-control" placeholder="Enter your email">
        </div>
        <button type="submit" class="btn btn-reset mb-3">Send Reset Link</button>
        <a href="login.html" class="text-decoration-none small text-muted"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
    </form>
</div>

</body>
</html>
